<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Consulta DNI FISE</title>
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
        <link rel="stylesheet" href="style-dni.css" />
        </style>
    </head>
    <body>
        <div class="header">
        <div class="header-icon">
            <img src = fise.jpg>
        </div>
        
        <div>
            <div class="header-title">Consulta de DNI</div>
            <div class="header-sub">Búsqueda por número de DNI</div>
        </div>
        </div>

        <div class="search-card">
        <label for="dniInput">Número de DNI</label>
        <div class="input-row">
            <input type="text" id="dniInput"
                placeholder="Ej: 01234567"
                maxlength="20"
                autocomplete="off"
                spellcheck="false">
            <button onclick="buscar()">Consultar</button>
        </div>
        <div class="counter" id="counter"></div>
        </div>

        <div class="result-area" id="resultArea"></div>

        <div class="footer">
        FONDO DE INCLUSIÓN SOCIAL ENERGÉTICO
        </div>

        <script src="app-dni.js"></script>
    </body>
</html>
