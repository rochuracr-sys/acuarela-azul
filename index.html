<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>CONSULTA DNI</title>
        <style>
            /* ── Fuentes del sistema, sin internet necesario ── */
            :root {
                --bg:        #f0f2f5;
                --card:      #ffffff;
                --border:    #dde1e9;
                --accent:    #1a56a0;
                --accent-lt: #e8eef8;
                --text:      #1a1e2a;
                --muted:     #6b7485;
                --success:   #1a6e47;
                --success-bg:#eaf5ef;
                --warn:      #92400e;
                --warn-bg:   #fef3c7;
                --empty:     #94a3b8;
                --shadow:    0 2px 12px rgba(0,0,0,.08);
            }

            * { box-sizing: border-box; margin: 0; padding: 0; }

            body {
                background: var(--bg);
                font-family: 'Segoe UI', system-ui, sans-serif;
                min-height: 100vh;
                display: flex;
                flex-direction: column;
                align-items: center;
                padding: 40px 16px 60px;
                color: var(--text);
            }

            /* ── Cabecera ── */
            .header {
                width: 100%; max-width: 560px;
                margin-bottom: 28px;
                display: flex; align-items: center; gap: 14px;
            }
            .header-icon {
                width: 46px; height: 46px; border-radius: 12px;
                background: var(--accent);
                display: grid; place-items: center;
                font-size: 22px; flex-shrink: 0;
                box-shadow: 0 4px 12px rgba(26,86,160,.3);
            }
            .header-title  { font-size: 1.25rem; font-weight: 700; letter-spacing: -.02em; }
            .header-sub    { font-size: .8rem; color: var(--muted); margin-top: 2px; }

            /* ── Tarjeta de búsqueda ── */
            .search-card {
                width: 100%; max-width: 560px;
                background: var(--card);
                border: 1px solid var(--border);
                border-radius: 16px;
                padding: 28px;
                box-shadow: var(--shadow);
            }

            label {
                display: block;
                font-size: .75rem; font-weight: 600;
                text-transform: uppercase; letter-spacing: .07em;
                color: var(--muted); margin-bottom: 8px;
            }

            .input-row {
                display: flex; gap: 10px;
            }

            input[type="text"] {
                flex: 1;
                padding: 11px 16px;
                border: 1.5px solid var(--border);
                border-radius: 10px;
                font-size: 1.05rem;
                font-family: 'Consolas', 'Courier New', monospace;
                letter-spacing: .08em;
                color: var(--text);
                background: #fafbfc;
                transition: border-color .15s, box-shadow .15s;
                outline: none;
            }
            input[type="text"]:focus {
                border-color: var(--accent);
                box-shadow: 0 0 0 3px rgba(26,86,160,.12);
                background: #fff;
            }
            input[type="text"]::placeholder { color: var(--empty); }

            button {
                padding: 11px 22px;
                background: var(--accent);
                color: #fff;
                border: none; border-radius: 10px;
                font-size: .92rem; font-weight: 600;
                cursor: pointer;
                transition: background .15s, transform .08s;
                white-space: nowrap;
            }
            button:hover  { background: #154e8a; }
            button:active { transform: scale(.97); }

            /* ── Resultado ── */
            .result-area {
                width: 100%; max-width: 560px;
                margin-top: 18px;
            }

            .not-found {
                background: var(--card);
                border: 1px solid var(--border);
                border-radius: 14px;
                padding: 22px 24px;
                text-align: center;
                color: var(--muted);
                font-size: .9rem;
            }
            .not-found strong { display: block; font-size: 1rem; color: var(--text); margin-bottom: 4px; }

            .result-card {
                background: var(--card);
                border: 1px solid var(--border);
                border-radius: 16px;
                overflow: hidden;
                box-shadow: var(--shadow);
                animation: fadeUp .2s ease;
            }
            @keyframes fadeUp { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:none} }

            .result-header {
                background: var(--accent);
                padding: 16px 22px;
                display: flex; align-items: center; justify-content: space-between;
            }
            .result-dni {
                font-family: 'Consolas', monospace;
                font-size: 1.1rem; font-weight: 700; color: #fff;
                letter-spacing: .1em;
            }
            .result-badge {
                font-size: .7rem; font-weight: 600; text-transform: uppercase;
                background: rgba(255,255,255,.18); color: #fff;
                padding: 3px 10px; border-radius: 999px; letter-spacing: .05em;
            }

            .fields {
                padding: 20px 22px;
                display: flex; flex-direction: column; gap: 0;
            }

            .field {
                display: flex; flex-direction: column; gap: 3px;
                padding: 13px 0;
                border-bottom: 1px solid var(--border);
            }
            .field:last-child { border-bottom: none; }

            .field-label {
                font-size: .68rem; font-weight: 700;
                text-transform: uppercase; letter-spacing: .1em;
                color: var(--muted);
            }

            .field-value {
                font-size: .97rem; color: var(--text); line-height: 1.45;
            }
            .field-value.empty {
                color: var(--empty); font-style: italic; font-size: .88rem;
            }

            /* Colores semánticos para estado */
            .estado-chip {
                display: inline-block;
                padding: 3px 10px; border-radius: 6px;
                font-size: .82rem; font-weight: 600;
                font-family: 'Consolas', monospace;
                background: var(--accent-lt); color: var(--accent);
            }

            /* ── Pie ── */
            .footer {
                margin-top: 40px;
                font-size: .72rem; color: var(--empty);
                text-align: center;
                line-height: 1.6;
            }

            /* ── Contador ── */
            .counter {
                font-size: .72rem; color: var(--muted);
                text-align: right; margin-top: 8px;
                padding-right: 2px;
            }
        </style>
    </head>
    <body>

        <div class="header">
        <div class="header-icon">🪪</div>
        <div>
            <div class="header-title">Consulta de DNI</div>
            <div class="header-sub">Búsqueda por número de DNI</div>
        </div>
        </div>

        <div class="search-card">
        <label for="dniInput">Número de DNI</label>
        <div class="input-row">
            <input type="text" id="dniInput"
                placeholder="Ej: 01234567"
                maxlength="20"
                autocomplete="off"
                spellcheck="false">
            <button onclick="buscar()">Consultar</button>
        </div>
        <div class="counter" id="counter"></div>
        </div>

        <div class="result-area" id="resultArea"></div>

        <div class="footer">
        Uso interno · Sin conexión a internet requerida<br>
        Para actualizar los datos, edita la sección <code>CATALOGO</code> de este archivo.
        </div>

        <script>
            // ════════════════════════════════════════════════════════════════════════════
            //  CATÁLOGO DE DATOS
            //  Formato de cada entrada:
            //    "DNI": ["Nombre", "Estado", "Observaciones", "Validaciones"]
            //  Usa "" para campos vacíos.
            // ════════════════════════════════════════════════════════════════════════════

            const CATALOGO = {
            
                "29289917": ["LEONARDA ANDREA", "TIENE SUMINISTRO", "E52"],
                "02264417": ["MARIA TERESA", "vale activo", ""],
                "02294805": ["LEONARDA", "TIENE SUMINISTRO", "E52"],
                "02295180": ["MARLENI", "CONSUMO PROMEDIO 0 KW", "S11"],
                "02264137": ["JUANA PASTORA", "vale activo", ""],
                "02282991": ["MARCELINO", "TIENE SUMINISTRO", "E52"],
                "29536000": ["JESUS ROBERTO", "FALLECIDO", "E2"],
                "40570180": ["ANTONIA MARINA", "vale activo", ""],
                "02283981": ["ANTONIA DOROTEA", "vale activo", ""],
                "43760975": ["YUDID AYDEE", "vale activo", ""],
                "02284123": ["PAULINO", "FALLECIDO", "E2"],
                "02264158": ["MARCELINA", "FALLECIDO", "E2"],
                "47243525": ["GILDA", "TIENE SUMINISTRO", "E52"],
                "42304789": ["ISABEL", "vale activo", ""],
                "02264428": ["JUSTA", "vale activo", ""],
                "70848059": ["DELIA GLADYS", "vale activo", ""],
                "42104255": ["ISIDRO", "RENUNCIA", "E11"],
                "02283939": ["FLORENCIA", "vale activo", ""],
                "02264788": ["FELIPA", "FALLECIDO", "E2"],
                "02282400": ["GRACIELA", "RENUNCIA", ""],
                "02282792": ["NATALIA EUGENIA", "vale activo", ""],
                "02272170": ["ANDREA AVELINA", "vale activo", ""],
                "42882592": ["DOMINGO", "vale activo", ""],
                "02292730": ["JUSTA FERMINA", "4 MESES SIN CANJE", "S3"],
                "02291445": ["EUSTAQUIA", "NUCLEO FAMILIAR BENEFICIADO", ""],
                "43301515": ["JAVIER", "vale activo", ""],
                "44429404": ["ANA ELIDA", "NUCLEO FAMILIAR BENEFICIADO", ""],
                "44572091": ["SILVIA SANDRA", "BENEFICIARIO SIN CSE", ""],
                "02300420": ["BASILIA ANTONIA", "NUCLEO FAMILIAR BENEFICIADO", ""],
                
                
            // ── Agrega aquí más registros ──────────────────────────────────────────
            // "12345678": ["Nombre Apellido", "Código", "Observación", "Validación"],
            };
            // ════════════════════════════════════════════════════════════════════════════

            // Mostrar total de registros
            document.getElementById('counter').textContent =
            Object.keys(CATALOGO).length.toLocaleString('es') + ' registros cargados';

            // Buscar al pulsar Enter
            document.getElementById('dniInput').addEventListener('keydown', e => {
            if (e.key === 'Enter') buscar();
            });

            function buscar() {
            const raw = document.getElementById('dniInput').value.trim();
            const area = document.getElementById('resultArea');

            if (!raw) { area.innerHTML = ''; return; }

            const datos = CATALOGO[raw];

            if (!datos) {
                area.innerHTML = `
                <div class="not-found">
                    <strong>DNI no encontrado</strong>
                    No existe ningún registro para el código <code>${escHtml(raw)}</code>.
                </div>`;
                return;
            }

            const [nombre, observaciones, estado] = datos;

            area.innerHTML = `
                <div class="result-card">
                <div class="result-header">
                    <span class="result-dni">${escHtml(raw)}</span>
                    <span class="result-badge">Encontrado</span>
                </div>
                <div class="fields">
                    ${campo('Nombre',        nombre,           false)}
                    ${campo('Observaciones', observaciones,    false)}
                    ${campo('Estado',        estado,           false)}
                </div>
                </div>`;
            }

            function campo(etiqueta, valor, esEstado) {
            if (!valor || valor.trim() === '') {
                return `<div class="field">
                <span class="field-label">${etiqueta}</span>
                <span class="field-value empty">— Sin datos —</span>
                </div>`;
            }
            const contenido = esEstado
                ? `<span class="estado-chip">${escHtml(valor)}</span>`
                : `<span class="field-value">${escHtml(valor)}</span>`;
            return `<div class="field">
                <span class="field-label">${etiqueta}</span>
                ${contenido}
            </div>`;
            }

            function escHtml(s) {
            return String(s)
                .replace(/&/g,'&amp;').replace(/</g,'&lt;')
                .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
            }
        </script>
    </body>
</html>
